<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Workout configuration (18 exercises)
        const exercises = [
            "垫步大跳", "开合跳", "交叉跳", "左右启动步", "大步", "前后左右",
            "左脚V字", "右脚V字", "摸脚尖", "转体跳", "高抬腿", "后踢腿",
            "全蹲转髋", "两边蹬跳", "半蹲跳", "鸭子跳", "小碎步", "波比跳"
        ];

        const workTime = 30;
        const restTime = 10;

        let currentIndex = 0;
        let currentPhase = 'WORK';
        let timeRemaining = workTime;
        let globalTime = 12 * 60;
        let isRunning = false;
        let timerInterval = null;

        const mainTimerEl = document.getElementById("main-timer");
        const globalTimerEl = document.getElementById("global-timer");
        const phaseTitleEl = document.getElementById("phase-title");
        const currentActionEl = document.getElementById("current-action");
        const nextActionEl = document.getElementById("next-action");
        const currentActionLabelEl = document.getElementById("current-action-label");
        const playPauseBtn = document.querySelector('.fixed.bottom-24.right-6 button');
        const playPauseIcon = playPauseBtn.querySelector('span');

        // ── BGM ENGINE (Web Audio API - no files needed) ─────────────
        let audioCtx = null;
        let beatInterval = null;
        let currentBpm = 0;

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        // Plays a single drum hit: kick (low) or hi-hat (high)
        function playDrumHit(type) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'kick') {
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(1.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.2);
            } else if (type === 'snare') {
                // Snare: noise burst
                const bufSize = ctx.sampleRate * 0.1;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
                const src = ctx.createBufferSource();
                src.buffer = buf;
                const snareGain = ctx.createGain();
                src.connect(snareGain);
                snareGain.connect(ctx.destination);
                snareGain.gain.setValueAtTime(0.5, ctx.currentTime);
                snareGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                src.start(ctx.currentTime);
            } else {
                // Hi-hat: short high tone
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, ctx.currentTime);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.04);
            }
        }

        // Beat patterns: array of [beat#, type] per bar
        const patterns = {
            110: [ [0,'kick'],[2,'hihat'],[4,'snare'],[6,'hihat'] ], // 4/4 relaxed
            120: [ [0,'kick'],[2,'hihat'],[4,'snare'],[6,'hihat'] ], // standard
            135: [ [0,'kick'],[1,'hihat'],[2,'snare'],[3,'hihat'],[4,'kick'],[5,'hihat'],[6,'snare'],[7,'hihat'] ], // 8th notes
            145: [ [0,'kick'],[1,'hihat'],[2,'kick'],[3,'snare'],[4,'kick'],[5,'hihat'],[6,'snare'],[7,'hihat'] ]  // driving
        };

        function startBeat(bpm) {
            stopBeat();
            currentBpm = bpm;
            const pat = patterns[bpm] || patterns[120];
            const totalBeats = pat.length;
            // ms per sub-beat
            const msBeat = (60000 / bpm) / (totalBeats / 4);
            let beatPos = 0;
            beatInterval = setInterval(() => {
                const hit = pat.find(p => p[0] === beatPos);
                if (hit) playDrumHit(hit[1] === 'hihat' ? 'hihat' : hit[1]);
                beatPos = (beatPos + 1) % totalBeats;
            }, msBeat);
        }

        function stopBeat() {
            if (beatInterval) { clearInterval(beatInterval); beatInterval = null; }
        }

        // ── VOICE ENGINE (short, punchy coach style) ──────────────────
        let voiceReady = false;
        let preferredVoice = null;

        function initVoice() {
            if (!('speechSynthesis' in window)) return;
            const tryPick = () => {
                const voices = window.speechSynthesis.getVoices();
                // Prefer non-Google, non-system robotic voice: look for Tingting, Meijia, or any zh-CN
                const picks = voices.filter(v => v.lang.startsWith('zh'));
                preferredVoice = picks.find(v => /Ting|Mei|Sin|Siri/i.test(v.name))
                               || picks[0]
                               || null;
                voiceReady = true;
            };
            window.speechSynthesis.onvoiceschanged = tryPick;
            tryPick();
        }
        initVoice();

        function speak(text, rate = 1.1, pitch = 1.1) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN';
            u.rate = rate;
            u.pitch = pitch;
            if (preferredVoice) u.voice = preferredVoice;
            window.speechSynthesis.speak(u);
        }

        // Short punchy cues
        function cueStart()    { speak("开始！", 1.2, 1.2); }
        function cuePause()    { speak("暂停", 1.0, 1.0); }
        function cueCountdown(n) { speak(String(n), 1.3, 1.3); }
        function cueRest(next) { speak(`换！${next}`, 1.1, 1.1); }
        function cueGo(name)   { speak(`${name}！走`, 1.2, 1.2); }
        function cueDone()     { speak("完成！", 1.1, 1.2); }

        // ── UI UPDATE ─────────────────────────────────────────────────
        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateUI() {
            mainTimerEl.textContent = formatTime(timeRemaining);
            globalTimerEl.textContent = formatTime(globalTime);

            if (currentPhase === 'DONE') {
                phaseTitleEl.textContent = "完成！";
                currentActionEl.textContent = "12分钟达成";
                nextActionEl.textContent = "拉伸放松一下吧";
                currentActionLabelEl.textContent = "COMPLETED";
                currentActionLabelEl.className = "inline-block text-[10px] bg-primary text-on-primary px-3 py-1 rounded-full font-bold uppercase mb-2";
                mainTimerEl.classList.remove('kinetic-glow', 'text-primary-fixed-dim');
                return;
            }

            if (currentPhase === 'WORK') {
                phaseTitleEl.textContent = `第 ${currentIndex + 1} / 18 组`;
                currentActionEl.textContent = exercises[currentIndex];
                currentActionLabelEl.textContent = "TRAINING";
                currentActionLabelEl.className = "inline-block text-[10px] bg-tertiary-container text-on-tertiary-container px-3 py-1 rounded-full font-bold uppercase transition-colors mb-2 animate-pulse";
                mainTimerEl.className = "font-headline text-[5rem] md:text-[7rem] leading-none font-bold tracking-tighter kinetic-glow text-primary-fixed-dim drop-shadow-[0_0_15px_#00daf3]";
            } else {
                phaseTitleEl.textContent = "休息";
                currentActionEl.textContent = "调整呼吸";
                currentActionLabelEl.textContent = "REST";
                currentActionLabelEl.className = "inline-block text-[10px] bg-error/80 text-on-error px-3 py-1 rounded-full font-bold uppercase mb-2";
                mainTimerEl.className = "font-headline text-[5rem] md:text-[7rem] leading-none font-bold tracking-tighter text-on-surface-variant";
            }

            const nextIdx = currentPhase === 'WORK' ? currentIndex + 1 : currentIndex;
            if (nextIdx < exercises.length) {
                nextActionEl.textContent = `下一个: ${exercises[nextIdx]}`;
            } else {
                nextActionEl.textContent = "最后一组，冲！";
            }
        }

        // ── TIMER CORE ────────────────────────────────────────────────
        function toggleTimer() {
            if (currentPhase === 'DONE') return;
            if (!audioCtx) getAudioCtx(); // unlock on first tap

            if (isRunning) {
                clearInterval(timerInterval);
                timerInterval = null;
                stopBeat();
                cuePause();
                playPauseIcon.textContent = 'play_arrow';
                playPauseBtn.classList.replace('bg-tertiary-container', 'bg-surface-variant');
                playPauseBtn.classList.replace('text-on-tertiary-container', 'text-on-surface');
            } else {
                cueStart();
                if (currentBpm > 0) startBeat(currentBpm);

                timerInterval = setInterval(() => {
                    if (globalTime <= 0) return;
                    timeRemaining--;
                    globalTime--;

                    // Last 3 seconds countdown
                    if ([3,2,1].includes(timeRemaining) && currentPhase === 'WORK') {
                        cueCountdown(timeRemaining);
                    }

                    if (timeRemaining < 0) {
                        if (currentPhase === 'WORK') {
                            currentPhase = 'REST';
                            currentIndex++;
                            if (currentIndex >= exercises.length) {
                                currentPhase = 'DONE';
                                timeRemaining = 0;
                                globalTime = 0;
                                clearInterval(timerInterval);
                                stopBeat();
                                updateUI();
                                cueDone();
                                return;
                            }
                            timeRemaining = restTime;
                            cueRest(exercises[currentIndex]);
                        } else {
                            currentPhase = 'WORK';
                            timeRemaining = workTime;
                            cueGo(exercises[currentIndex]);
                        }
                    }
                    updateUI();
                }, 1000);

                playPauseIcon.textContent = 'pause';
                playPauseBtn.classList.replace('bg-surface-variant', 'bg-tertiary-container');
                playPauseBtn.classList.replace('text-on-surface', 'text-on-tertiary-container');
            }
            isRunning = !isRunning;
        }

        // Init paused state
        updateUI();
        playPauseIcon.textContent = 'play_arrow';
        playPauseBtn.classList.replace('bg-tertiary-container', 'bg-surface-variant');
        playPauseBtn.classList.replace('text-on-tertiary-container', 'text-on-surface');
        playPauseBtn.addEventListener('click', toggleTimer);

        // ── BGM BUTTON WIRING ─────────────────────────────────────────
        const bpmMap = [120, 135, 145, 110]; // matches the 4 buttons in order
        const musicButtons = document.querySelectorAll('#music-buttons button');
        musicButtons.forEach((btn, i) => {
            btn.addEventListener('click', function() {
                musicButtons.forEach(b => {
                    b.classList.remove('bg-tertiary-container/20', 'border', 'border-tertiary-container/30', 'text-tertiary', 'shadow-[0_0_12px_#00daf344]');
                    b.classList.add('bg-surface-container-highest/50', 'text-on-surface-variant');
                    const sp = b.querySelector('span.material-symbols-outlined');
                    if(sp) sp.style.fontVariationSettings = "'FILL' 0";
                });
                this.classList.remove('bg-surface-container-highest/50', 'text-on-surface-variant');
                this.classList.add('bg-tertiary-container/20', 'border', 'border-tertiary-container/30', 'text-tertiary', 'shadow-[0_0_12px_#00daf344]');
                const sp = this.querySelector('span.material-symbols-outlined');
                if(sp) sp.style.fontVariationSettings = "'FILL' 1";

                const bpm = bpmMap[i];
                startBeat(bpm);
            });
        });
    });
</script>
</body></html>
